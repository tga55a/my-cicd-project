# Human-readable name shown in the Actions tab
name: CI
on: [push, pull_request]   # trigger on every push and every PR

jobs:
  test:
    runs-on: ubuntu-latest  # fresh VM for every run
    steps:
      # Clone repo at the triggering commit SHA
      - uses: actions/checkout@v4
      # Install Python 3.12 on the runner
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      # Install all project dependencies
      - name: Install
        run: pip install -r requirements.txt
      # Lint — fail immediately on style errors
      - name: Lint
        run: flake8 src/ tests/
      # Run tests, skip external, require ≥80% coverage
      - name: Test
        run: pytest -x -m "not external" --cov=src --cov-fail-under=80